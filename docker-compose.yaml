version: '3.8'  #version of docker

services:
  api:
    build: 
      context: .  #at the dir where docker-compose.yaml is located
      dockerfile: Dockerfile.api 
    container_name: fraud_detection_system
    ports:
      - "8000:8000" 
    restart: always  
    volumes:
      # Mounting local client.properties into the container as read-only at the time of runtime as our kafka configuration file contains sensitive information such as credentials and we want to keep it secure.
      # This keeps credentials OFF the image layer (never baked into Docker image) only available at the docker container runtime
      - ./secrets/client.properties:/app/secrets/client.properties:ro  
    # Adding a health check to ensure the application is running and healthy. This allows Docker to automatically restart the container if it becomes unhealthy, improving the reliability of our fraud detection system.
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s 
  dashboard:
    build: 
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: fraud_detection_dashboard
    ports:
      - "8501:8501"
    volumes:
      # Mounting local client.properties into the container as read-only at the time of runtime as our kafka configuration file contains sensitive information such as credentials and we want to keep it secure.
      # This keeps credentials OFF the image layer (never baked into Docker image) only available at the docker container runtime
      - ./secrets/client.properties:/app/secrets/client.properties:ro 
    # Adding a health check to ensure the application is running and healthy. This allows Docker to automatically restart the container if it becomes unhealthy, improving the reliability of our fraud detection system.
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8501/_stcore/health"]   #builtin streamlit health check endpoint
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s      



