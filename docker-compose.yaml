version: '3.8'  #version of docker

services:
  api:
    build: 
      context: .  #at the dir where docker-compose.yaml is located
      dockerfile: Dockerfile.api 
    image: asoktamang/fraud_detection_api   #image name to match the repo in dockerhub
    container_name: fraud_detection_api
    ports:
      - "8000:8000" 
    restart: always  
    

    # Adding a health check to ensure the application is running and healthy. This allows Docker to automatically restart the container if it becomes unhealthy, improving the reliability of our fraud detection system.
    healthcheck:
      test: ["CMD", "curl", "-f", "-q", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s 
    environment:
      KAFKA_TRANSACTION_TOPIC: transactions
      KAFKA_FRAUD_RESULT_TOPIC: fraud_results
      KAFKA_DLQ_TOPIC: transactions_dlq 
      KAFKA_CONFIG_PATH : secrets/client.properties
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}  #using ${}  so that docker compose can read the env variables from .env file and pass it to the container as env variables at
      KAFKA_SECURITY_PROTOCOL : ${KAFKA_SECURITY_PROTOCOL}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME}
      KAFKA_SASL_PASSWORD : ${KAFKA_SASL_PASSWORD}
  dashboard:
    build: 
      context: .
      dockerfile: Dockerfile.dashboard
    image: asoktamang/fraud_detection_dashboard  
    container_name: fraud_detection_dashboard
    ports:
      - "8501:8501"
    depends_on:  #only if there is prediction done by our model, we can show the transaction details as well as the prediction live on our dashboard
      api:
       condition: service_healthy  # Ensuring the dashboard starts only after the API is healthy and ready to serve requests, preventing connection issues and improving user experience. 
    # Adding a health check to ensure the application is running and healthy. This allows Docker to automatically restart the container if it becomes unhealthy, improving the reliability of our fraud detection system.
    restart: always
    healthcheck:
      test: ["CMD",  "curl", "-f", "-q", "http://localhost:8501/_stcore/health"]   #builtin streamlit health check endpoint
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s      
    environment:
      KAFKA_TRANSACTION_TOPIC: transactions
      KAFKA_FRAUD_RESULT_TOPIC: fraud_results
      KAFKA_DLQ_TOPIC: transactions_dlq 
      KAFKA_CONFIG_PATH : secrets/client.properties
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_SECURITY_PROTOCOL : ${KAFKA_SECURITY_PROTOCOL}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME}
      KAFKA_SASL_PASSWORD : ${KAFKA_SASL_PASSWORD}
      KAFKA_CONSUMER_GROUP_ID : ${KAFKA_CONSUMER_GROUP_ID}


